<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RamRyder</title>
    <meta
      name="description"
      content="RamRyder is a software-defined elastic memory system for cloud virtual machines."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="/">RamRyder</a>
        <nav class="nav">
          <a href="https://github.com/ramryder-project/ramryder">GitHub</a>
        </nav>
      </header>

      <main class="hero">
        <div class="hero-left">
          <h1>Software-Defined Elastic Memory for Cloud VMs</h1>
          <p class="hero-text">
            RamRyder manages and allocates memory channels in software, allowing each virtual
            machine to scale memory capacity and bandwidth based on workload demand.
          </p>
          <div class="hero-actions">
            <a class="solid-button" href="https://github.com/ramryder-project/ramryder">
              Get Started
            </a>
            <a class="ghost-button" href="https://ramryder-project.github.io/docs/getting-started/overview">
              Docs
            </a>
          </div>
        </div>

        <div class="hero-right">
          <figure class="hero-logo-wrap">
            <img class="hero-logo" src="./logos/logo_large_no_bg_new.png" alt="RamRyder logo" />
          </figure>
        </div>
      </main>
    </div>
  </body>
</html>
